<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Luxury Tech Pricing</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<style>
    /* 全局样式 */
    * {margin:0;padding:0;box-sizing:border-box;}
    body {
        font-family: 'Segoe UI', sans-serif;
        overflow-x: hidden;
        background: #000;
        color: #fff;
    }

    /* 全屏背景Canvas */
    #bgCanvas {
        position: fixed;
        top: 0; left: 0;
        width: 100%; height: 100%;
        z-index: -2;
        background: radial-gradient(circle at 20% 20%, rgba(60,0,80,0.6), rgba(0,0,0,1) 80%);
    }

    /* 半透明光雾层 */
    #nebula {
        position: fixed;
        top: 0; left: 0;
        width: 100%; height: 100%;
        background: conic-gradient(from 0deg, rgba(255,0,150,0.2), rgba(0,200,255,0.2), rgba(255,200,0,0.2), rgba(255,0,150,0.2));
        animation: spin 60s linear infinite;
        filter: blur(150px);
        z-index: -1;
    }
    @keyframes spin {
        0% {transform: rotate(0deg);}
        100% {transform: rotate(360deg);}
    }

    /* 顶部Banner */
    .promo-banner {
        width: 100%;
        padding: 12px;
        text-align: center;
        font-size: 1.2rem;
        background: linear-gradient(270deg, #ff0080, #ff8c00, #40e0d0, #ff0080);
        background-size: 600% 600%;
        animation: bannerFlow 8s ease infinite;
        font-weight: bold;
        text-shadow: 0 0 10px rgba(0,0,0,0.6);
    }
    @keyframes bannerFlow {
        0%{background-position:0% 50%}
        50%{background-position:100% 50%}
        100%{background-position:0% 50%}
    }

    /* 定价卡片容器 */
    .pricing-container {
        display: flex;
        justify-content: center;
        gap: 40px;
        padding: 80px 20px;
        flex-wrap: wrap;
        position: relative;
        z-index: 1;
    }

    /* 卡片样式 */
    .card {
        width: 300px;
        padding: 30px;
        border-radius: 20px;
        background: rgba(255,255,255,0.05);
        backdrop-filter: blur(15px);
        box-shadow: 0 0 20px rgba(255,255,255,0.1);
        border: 2px solid rgba(255,255,255,0.2);
        text-align: center;
        transition: all 0.4s ease;
        position: relative;
        overflow: hidden;
    }
    .card::before {
        content: "";
        position: absolute;
        top: -50%; left: -50%;
        width: 200%; height: 200%;
        background: linear-gradient(120deg, transparent, rgba(255,255,255,0.1), transparent);
        transform: rotate(25deg);
        animation: shine 4s infinite;
    }
    @keyframes shine {
        0% {transform: translateX(-100%) rotate(25deg);}
        100% {transform: translateX(100%) rotate(25deg);}
    }
    .card:hover {
        transform: translateY(-15px) scale(1.05);
        box-shadow: 0 0 30px rgba(255,255,255,0.3);
    }

    /* PRO 卡片特效 */
    .pro {
        border: 2px solid gold;
        box-shadow: 0 0 30px gold;
    }
    .pro::after {
        content: "👑";
        position: absolute;
        top: 10px; right: 10px;
        font-size: 1.5rem;
    }

    /* 标题价格按钮 */
    .card h2 {margin-bottom: 10px;}
    .price {
        font-size: 2.5rem;
        font-weight: bold;
        color: #fff;
        text-shadow: 0 0 10px currentColor, 0 0 20px currentColor;
        margin-bottom: 20px;
    }
    .btn {
        display: inline-block;
        padding: 10px 20px;
        border-radius: 30px;
        background: linear-gradient(90deg, #ff00cc, #3333ff);
        color: #fff;
        text-decoration: none;
        transition: all 0.3s ease;
        box-shadow: 0 0 15px rgba(255,255,255,0.2);
        position: relative;
        overflow: hidden;
    }
    .btn:hover {
        transform: scale(1.1);
        box-shadow: 0 0 25px rgba(255,255,255,0.5);
    }

</style>
</head>
<body>

<canvas id="bgCanvas"></canvas>
<div id="nebula"></div>

<div class="promo-banner">🔥 EARLY BIRD — LIMITED TIME PROMOTION 🔥</div>

<div class="pricing-container">
    <div class="card">
        <h2>Starter</h2>
        <div class="price">$19</div>
        <p>Basic features for personal use</p>
        <a href="#" class="btn">Choose Starter</a>
    </div>
    <div class="card pro">
        <h2>Pro</h2>
        <div class="price">$49</div>
        <p>Advanced features for professionals</p>
        <a href="#" class="btn">Choose Pro</a>
    </div>
    <div class="card">
        <h2>Growth</h2>
        <div class="price">$99</div>
        <p>Full features for growing teams</p>
        <a href="#" class="btn">Choose Growth</a>
    </div>
</div>

<script>
    // 粒子背景效果
    const canvas = document.getElementById('bgCanvas');
    const ctx = canvas.getContext('2d');
    let particles = [];
    let w, h;

    function init() {
        w = canvas.width = window.innerWidth;
        h = canvas.height = window.innerHeight;
        particles = [];
        for (let i = 0; i < 150; i++) {
            particles.push({
                x: Math.random() * w,
                y: Math.random() * h,
                r: Math.random() * 2 + 1,
                dx: (Math.random() - 0.5) * 0.5,
                dy: (Math.random() - 0.5) * 0.5
            });
        }
    }

    function draw() {
        ctx.clearRect(0, 0, w, h);
        ctx.fillStyle = 'rgba(255,255,255,0.8)';
        particles.forEach(p => {
            ctx.beginPath();
            ctx.arc(p.x, p.y, p.r, 0, Math.PI * 2);
            ctx.fill();
            p.x += p.dx;
            p.y += p.dy;
            if (p.x < 0 || p.x > w) p.dx *= -1;
            if (p.y < 0 || p.y > h) p.dy *= -1;
        });
        requestAnimationFrame(draw);
    }

    window.addEventListener('resize', init);
    init();
    draw();
</script>

</body>
</html>
