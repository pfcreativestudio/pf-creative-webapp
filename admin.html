<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Panel - PF Creative AI Studio</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        :root {
            --bg-dark-1: #0a0a0a;
            --bg-dark-2: #1a1a1a;
            --text-light: #e0e0e0;
            --text-dark: #a0a0a0;
            --accent-1: #f59e0b;
            --accent-2: #ec4899;
            --accent-3: #8b5cf6;
            --danger-1: #ef4444;
            --danger-2: #dc2626;
            --success-1: #22c55e;
            --info-1: #3b82f6;
        }
        body {
            background: linear-gradient(135deg, var(--bg-dark-1) 0%, var(--bg-dark-2) 50%, var(--bg-dark-1) 100%);
            color: var(--text-light);
            font-family: sans-serif;
        }
        .glass-effect {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
        .gradient-text {
            background: linear-gradient(45deg, var(--accent-1), var(--accent-2), var(--accent-3));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }
        .btn-primary {
            background: linear-gradient(45deg, var(--accent-1), var(--accent-2));
            transition: all 0.3s ease;
        }
        .btn-primary:hover {
            transform: scale(1.05);
            box-shadow: 0 10px 20px rgba(245, 158, 11, 0.3);
        }
        .btn-danger {
            background: linear-gradient(45deg, var(--danger-1), var(--danger-2));
            transition: all 0.3s ease;
        }
        .btn-danger:hover {
            transform: scale(1.05);
            box-shadow: 0 10px 20px rgba(239, 68, 68, 0.3);
        }
        #passwordPromptOverlay, #editUserModalOverlay {
            position: fixed; top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0, 0, 0, 0.8);
            display: flex; justify-content: center; align-items: center;
            z-index: 1000;
        }
        #passwordPromptBox, #editUserModalBox {
            background: var(--bg-dark-2); padding: 30px; border-radius: 10px;
            text-align: center; box-shadow: 0 0 20px rgba(0, 0, 0, 0.5);
        }
        /* Custom styles for table */
        .user-table {
            width: 100%;
            border-collapse: collapse;
        }
        .user-table th, .user-table td {
            padding: 12px 15px;
            text-align: left;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
        }
        .user-table th {
            background-color: rgba(255, 255, 255, 0.1);
            font-weight: 600;
            color: var(--text-light);
        }
        .user-table tbody tr {
            transition: background-color 0.2s ease-in-out;
        }
        .user-table tbody tr:hover {
            background-color: rgba(255, 255, 255, 0.07);
        }
        .status-badge {
            padding: 4px 8px;
            border-radius: 9999px;
            font-size: 0.75rem;
            font-weight: 600;
            display: inline-flex;
            align-items: center;
            gap: 4px;
        }
        .status-badge.active { background-color: var(--success-1); color: white; }
        .status-badge.expired { background-color: var(--danger-1); color: white; }
        .status-badge.no-expiry { background-color: var(--info-1); color: white; }

        .modal-input {
            width: 100%;
            padding: 8px 12px;
            background: #0a0a0a;
            border: 1px solid #4a4a4a;
            border-radius: 6px;
            color: white;
        }
    </style>
</head>
<body>
    <div id="passwordPromptOverlay">
        <div id="passwordPromptBox" class="w-full max-w-sm">
            <h2 class="text-xl font-semibold text-white mb-4">Enter Admin Password</h2>
            <input type="password" id="adminPasswordInput" class="w-full px-4 py-2 bg-black/50 border border-gray-600 rounded-lg text-white focus:border-purple-500 focus:outline-none mb-4" placeholder="Admin Password">
            <button id="submitAdminPassword" class="btn-primary w-full px-6 py-2 rounded-lg text-white font-semibold">Submit</button>
        </div>
    </div>

    <div id="editUserModalOverlay" class="hidden">
        <div id="editUserModalBox" class="w-full max-w-md text-left">
            <h2 class="text-xl font-semibold text-white mb-6">Edit User: <span id="editUsername" class="font-bold"></span></h2>
            <form id="editUserForm">
                 <div class="mb-4">
                    <label class="block text-sm font-medium text-gray-300 mb-2">New Password (optional)</label>
                    <input type="text" id="editPassword" class="modal-input" placeholder="Leave blank to keep current password">
                </div>
                <div class="mb-6">
                    <label class="block text-sm font-medium text-gray-300 mb-2">Expiration Date (optional)</label>
                    <input type="date" id="editExpiresAt" class="modal-input">
                </div>
                <div class="flex justify-end space-x-3">
                    <button type="button" id="cancelEditBtn" class="px-4 py-2 bg-gray-600 hover:bg-gray-700 rounded-lg text-white text-sm transition duration-300">Cancel</button>
                    <button type="submit" class="px-4 py-2 bg-blue-600 hover:bg-blue-700 rounded-lg text-white text-sm transition duration-300">Save Changes</button>
                </div>
            </form>
        </div>
    </div>


    <div class="min-h-screen p-6 hidden" id="adminContent">
        <div class="max-w-7xl mx-auto">
            <div class="glass-effect rounded-lg p-6 mb-8">
                <h1 class="text-3xl font-bold gradient-text mb-2">Admin Panel</h1>
                <p class="text-gray-400">Manage user credentials for PF Creative AI Studio</p>
                <div class="mt-4 flex items-center space-x-4">
                    <div class="flex items-center space-x-2">
                        <div class="w-3 h-3 bg-green-500 rounded-full animate-pulse"></div>
                        <span class="text-sm text-green-400">System Online</span>
                    </div>
                    <div class="text-sm text-gray-400">
                        Total Users: <span id="totalUsers" class="text-white font-semibold">0</span>
                    </div>
                </div>
            </div>

            <div class="glass-effect rounded-lg p-6 mb-8">
                <h2 class="text-xl font-semibold text-white mb-4">Add New User</h2>
                <form id="addUserForm" class="grid grid-cols-1 md:grid-cols-4 gap-4">
                    <div>
                        <label class="block text-sm font-medium text-gray-300 mb-2">Username</label>
                        <input type="text" id="newUsername" class="w-full px-4 py-2 bg-black/50 border border-gray-600 rounded-lg text-white focus:border-purple-500 focus:outline-none" placeholder="Enter username" required>
                    </div>
                    <div>
                        <label class="block text-sm font-medium text-gray-300 mb-2">Password</label>
                        <input type="text" id="newPassword" class="w-full px-4 py-2 bg-black/50 border border-gray-600 rounded-lg text-white focus:border-purple-500 focus:outline-none" placeholder="Enter password" required>
                    </div>
                    <div>
                        <label class="block text-sm font-medium text-gray-300 mb-2">Expiration Date (Optional)</label>
                        <input type="date" id="newExpiresAt" class="w-full px-4 py-2 bg-black/50 border border-gray-600 rounded-lg text-white focus:border-purple-500 focus:outline-none">
                    </div>
                    <div class="flex items-end">
                        <button type="submit" class="btn-primary w-full px-6 py-2 rounded-lg text-white font-semibold">Add User</button>
                    </div>
                </form>
            </div>

            <div class="glass-effect rounded-lg p-6">
                <div class="flex flex-col md:flex-row justify-between items-center mb-6 gap-4">
                    <h2 class="text-xl font-semibold text-white">Current Users</h2>
                    <div class="flex items-center gap-4 w-full md:w-auto">
                        <input type="search" id="searchBar" placeholder="Search by username..." class="w-full md:w-64 px-4 py-2 bg-black/50 border border-gray-600 rounded-lg text-white focus:border-purple-500 focus:outline-none">
                        <button id="refreshBtn" class="px-4 py-2 bg-blue-600 hover:bg-blue-700 rounded-lg text-white text-sm transition duration-300 flex-shrink-0">Refresh</button>
                    </div>
                </div>
                
                <div id="usersListContainer" class="overflow-x-auto">
                     <table class="user-table">
                        <thead>
                            <tr>
                                <th>Username</th>
                                <th>Password</th>
                                <th>Status</th>
                                <th>Time Remaining</th>
                                <th>Actions</th>
                            </tr>
                        </thead>
                        <tbody id="usersList"></tbody>
                    </table>
                </div>
                
                <div id="loadingMessage" class="text-center py-8 text-gray-400">Loading users...</div>
                <div id="emptyMessage" class="text-center py-8 text-gray-400 hidden">No users found. Add a user above.</div>
                <div id="noResultsMessage" class="text-center py-8 text-gray-400 hidden">No users match your search.</div>
            </div>
        </div>
    </div>

    <div id="messageContainer" class="fixed top-4 right-4 z-50"></div>

    <script>
        class AdminPanel {
            constructor() {
                this.apiUrl = 'https://asia-southeast1-pf-studio-prod.cloudfunctions.net/pfsystem-api';
                this.adminPassword = null;
                this.users = []; // Cache for user data
                this.init();
            }

            init() {
                document.getElementById("submitAdminPassword").addEventListener("click", () => this.verifyAdminPassword());
                document.getElementById("adminPasswordInput").addEventListener("keypress", (e) => {
                    if (e.key === "Enter") this.verifyAdminPassword();
                });
            }

            async verifyAdminPassword() {
                const inputPassword = document.getElementById("adminPasswordInput").value;
                if (!inputPassword) {
                    this.showMessage("Please enter the Admin Password", "error");
                    return;
                }
                try {
                    const response = await fetch(`${this.apiUrl}/admin/verify-password`, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json', 'X-Admin-Password': inputPassword },
                        body: JSON.stringify({}) // Body is not strictly needed but good practice
                    });

                    if (response.ok) {
                        this.adminPassword = inputPassword;
                        document.getElementById("passwordPromptOverlay").style.display = "none";
                        document.getElementById("adminContent").classList.remove("hidden");
                        this.setupEventListeners();
                        this.loadUsers();
                    } else {
                        const errorData = await response.json();
                        this.showMessage(errorData.error || "Incorrect Admin Password", "error");
                    }
                } catch (error) {
                    this.showMessage("Network error during password verification.", "error");
                    console.error("Error verifying admin password:", error);
                }
            }

            setupEventListeners() {
                document.getElementById("addUserForm").addEventListener("submit", (e) => {
                    e.preventDefault();
                    this.addUser();
                });

                document.getElementById("refreshBtn").addEventListener("click", () => this.loadUsers());
                
                document.getElementById("searchBar").addEventListener("input", (e) => {
                    this.filterUsers(e.target.value);
                });

                // Edit Modal Listeners
                document.getElementById("cancelEditBtn").addEventListener("click", () => {
                    document.getElementById("editUserModalOverlay").classList.add("hidden");
                });

                document.getElementById("editUserForm").addEventListener("submit", (e) => {
                    e.preventDefault();
                    const username = document.getElementById('editUsername').textContent;
                    const newPassword = document.getElementById('editPassword').value.trim();
                    const expiresAt = document.getElementById('editExpiresAt').value;
                    this.updateUser(username, newPassword, expiresAt);
                });
            }

            async makeAdminRequest(endpoint, method, body = null) {
                if (!this.adminPassword) {
                    this.showMessage("Admin password not set. Please refresh.", "error");
                    return Promise.reject(new Error("Admin password not set."));
                }
                const headers = {
                    'Content-Type': 'application/json',
                    'X-Admin-Password': this.adminPassword
                };
                const options = { method, headers };
                if (body) {
                    options.body = JSON.stringify(body);
                }
                return fetch(`${this.apiUrl}${endpoint}`, options);
            }

            async addUser() {
                const username = document.getElementById("newUsername").value.trim();
                const password = document.getElementById("newPassword").value.trim();
                const expiresAt = document.getElementById("newExpiresAt").value;

                if (!username || !password) {
                    this.showMessage("Username and Password are required", "error");
                    return;
                }

                const body = { username, password };
                if (expiresAt) {
                    // Convert to UTC ISO string to be safe
                    body.expires_at = new Date(expiresAt).toISOString();
                }

                try {
                    const response = await this.makeAdminRequest("/admin/add-user", "POST", body);
                    const result = await response.json();

                    if (response.ok) {
                        this.showMessage("User added successfully!", "success");
                        document.getElementById("addUserForm").reset();
                        this.loadUsers();
                    } else {
                        this.showMessage(result.error || "Failed to add user", "error");
                    }
                } catch (error) {
                    this.showMessage("Network error. Please try again.", "error");
                    console.error("Error adding user:", error);
                }
            }

            async loadUsers() {
                document.getElementById("loadingMessage").classList.remove("hidden");
                document.getElementById("emptyMessage").classList.add("hidden");
                document.getElementById("noResultsMessage").classList.add("hidden");
                document.getElementById("usersList").innerHTML = "";
                document.getElementById("totalUsers").textContent = "0";
                document.getElementById("searchBar").value = "";

                try {
                    const response = await this.makeAdminRequest("/admin/users", "GET");
                    const result = await response.json();
                    
                    document.getElementById("loadingMessage").classList.add("hidden");

                    if (response.ok && result.users) {
                        this.users = result.users;
                        document.getElementById("totalUsers").textContent = this.users.length;
                        if (this.users.length === 0) {
                            document.getElementById("emptyMessage").classList.remove("hidden");
                        } else {
                            this.renderUsers(this.users);
                        }
                    } else {
                        this.showMessage(result.error || "Failed to load users", "error");
                        document.getElementById("emptyMessage").classList.remove("hidden");
                    }
                } catch (error) {
                    document.getElementById("loadingMessage").classList.add("hidden");
                    this.showMessage("Network error. Please try again.", "error");
                    console.error("Error loading users:", error);
                }
            }

            filterUsers(searchTerm) {
                const lowercasedTerm = searchTerm.toLowerCase();
                const filteredUsers = this.users.filter(user => 
                    user.username.toLowerCase().includes(lowercasedTerm)
                );
                this.renderUsers(filteredUsers);
                
                document.getElementById("noResultsMessage").classList.toggle(filteredUsers.length === 0 && this.users.length > 0);
            }

            renderUsers(users) {
                const usersListBody = document.getElementById("usersList");
                usersListBody.innerHTML = users.map(user => {
                    const { status, timeRemaining, badgeClass } = this.calculateExpiry(user.expires_at);
                    return `
                        <tr data-username="${this.escapeHtml(user.username)}">
                            <td class="font-medium text-white">${this.escapeHtml(user.username)}</td>
                            <td>${this.escapeHtml(user.password)}</td>
                            <td>
                                <span class="status-badge ${badgeClass}">
                                    ${status}
                                </span>
                            </td>
                            <td class="${timeRemaining.includes('Expired') ? 'text-red-400' : 'text-gray-300'}">${timeRemaining}</td>
                            <td>
                                <div class="flex space-x-2">
                                    <button onclick="adminPanel.showEditModal('${this.escapeHtml(user.username)}')" class="px-3 py-1 bg-blue-600 hover:bg-blue-700 rounded text-white text-xs transition duration-300">Edit</button>
                                    <button onclick="adminPanel.deleteUser('${this.escapeHtml(user.username)}')" class="btn-danger px-3 py-1 rounded text-white text-xs">Delete</button>
                                </div>
                            </td>
                        </tr>
                    `;
                }).join("");
            }

            calculateExpiry(expiresAtStr) {
                if (!expiresAtStr) {
                    return { status: 'Active', timeRemaining: 'No Expiry', badgeClass: 'no-expiry' };
                }
                const expiryDate = new Date(expiresAtStr);
                const now = new Date();
                const diffTime = expiryDate - now;
                const diffDays = Math.ceil(diffTime / (1000 * 60 * 60 * 24));

                if (diffDays <= 0) {
                    return { status: 'Expired', timeRemaining: `Expired ${-diffDays} days ago`, badgeClass: 'expired' };
                }
                return { status: 'Active', timeRemaining: `${diffDays} days left`, badgeClass: 'active' };
            }

            async deleteUser(username) {
                if (!confirm(`Are you sure you want to delete user "${username}"? This cannot be undone.`)) {
                    return;
                }
                try {
                    const response = await this.makeAdminRequest("/admin/delete-user", "DELETE", { username });
                    const result = await response.json();
                    if (response.ok) {
                        this.showMessage("User deleted successfully!", "success");
                        this.loadUsers();
                    } else {
                        this.showMessage(result.error || "Failed to delete user", "error");
                    }
                } catch (error) {
                    this.showMessage("Network error. Please try again.", "error");
                    console.error("Error deleting user:", error);
                }
            }
            
            showEditModal(username) {
                const user = this.users.find(u => u.username === username);
                if (!user) return;

                document.getElementById('editUsername').textContent = user.username;
                document.getElementById('editPassword').value = '';
                // Format YYYY-MM-DD for the date input
                document.getElementById('editExpiresAt').value = user.expires_at ? user.expires_at.split('T')[0] : '';
                document.getElementById('editUserModalOverlay').classList.remove('hidden');
            }

            async updateUser(username, newPassword, expiresAt) {
                const body = { username };
                // Only include fields that are being changed
                if (newPassword) {
                    body.password = newPassword;
                }
                if (expiresAt !== undefined) {
                     // An empty string in the date input means we want to clear the expiration
                     body.expires_at = expiresAt ? new Date(expiresAt).toISOString() : '';
                }

                try {
                    const response = await this.makeAdminRequest("/admin/update-user", "PUT", body);
                    const result = await response.json();

                    if (response.ok) {
                        this.showMessage("User updated successfully!", "success");
                        document.getElementById("editUserModalOverlay").classList.add("hidden");
                        this.loadUsers();
                    } else {
                        this.showMessage(result.error || "Failed to update user", "error");
                    }
                } catch (error) {
                    this.showMessage("Network error. Please try again.", "error");
                    console.error("Error updating user:", error);
                }
            }

            showMessage(message, type) {
                const container = document.getElementById("messageContainer");
                const messageDiv = document.createElement("div");
                const bgColor = type === "success" ? "bg-green-600" : (type === "error" ? "bg-red-600" : "bg-blue-600");
                messageDiv.className = `${bgColor} text-white px-6 py-3 rounded-lg shadow-lg mb-2 transform transition-all duration-300`;
                messageDiv.textContent = message;
                container.appendChild(messageDiv);
                
                setTimeout(() => {
                    messageDiv.style.opacity = "0";
                    messageDiv.style.transform = "translateX(100%)";
                    setTimeout(() => container.removeChild(messageDiv), 300);
                }, 3000);
            }

            escapeHtml(text) {
                const div = document.createElement("div");
                div.textContent = text;
                return div.innerHTML;
            }
        }

        const adminPanel = new AdminPanel();
    </script>
</body>
</html>
