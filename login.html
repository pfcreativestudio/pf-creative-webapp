<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - PF Creative AI Studio</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background: linear-gradient(135deg, #0a0a0a 0%, #1a1a1a 50%, #0a0a0a 100%); color: #e0e0e0; font-family: sans-serif; }
        .gradient-text { background: linear-gradient(45deg, #f59e0b, #ec4899, #8b5cf6); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; }
        .btn-primary { background: linear-gradient(45deg, #f59e0b, #ec4899); transition: all 0.3s ease; }
        .btn-primary:hover:not(:disabled) { transform: scale(1.05); box-shadow: 0 10px 20px rgba(245, 158, 11, 0.3); }
        .btn-primary:disabled { background: #444; cursor: not-allowed; }
    </style>
</head>
<body class="flex items-center justify-center min-h-screen">
    <div class="w-full max-w-md p-8 space-y-8 bg-black/30 backdrop-blur-lg border border-gray-700 rounded-2xl shadow-2xl">
        <div class="text-center">
            <h1 class="text-3xl font-bold gradient-text">Welcome Back</h1>
            <p class="mt-2 text-gray-400">Log in to access your AI Film Director</p>
        </div>
        <form id="loginForm" class="space-y-6">
            <div>
                <label for="username" class="block text-sm font-medium text-gray-300">Username</label>
                <input id="username" name="username" type="text" required class="w-full px-4 py-2 mt-1 bg-black/50 border border-gray-600 rounded-lg text-white focus:border-purple-500 focus:outline-none" placeholder="Enter your username">
            </div>
            <div>
                <label for="password" class="block text-sm font-medium text-gray-300">Password</label>
                <input id="password" name="password" type="password" required class="w-full px-4 py-2 mt-1 bg-black/50 border border-gray-600 rounded-lg text-white focus:border-purple-500 focus:outline-none" placeholder="Enter your password">
            </div>
            <div>
                <button type="submit" id="submitButton" class="w-full btn-primary px-6 py-3 rounded-lg text-white font-semibold">Log In</button>
            </div>
        </form>
        <p id="message" class="text-center text-sm h-4"></p>
        <div class="text-center text-sm text-gray-400">
            Don't have an account? <a href="register.html" class="font-medium text-purple-400 hover:text-purple-300">Register here</a>
        </div>
    </div>

    <script>
        const form = document.getElementById('loginForm');
        const submitButton = document.getElementById('submitButton');
        const messageDiv = document.getElementById('message');
        
        // 【核心修正】确保API地址是您Google Cloud Function的完整URL + 对应的路径
        const apiUrl = 'https://asia-southeast1-pf-studio-prod.cloudfunctions.net/pfsystem-api/login';

        form.addEventListener('submit', async (e) => {
            e.preventDefault();
            
            submitButton.disabled = true;
            submitButton.textContent = 'Logging in...';
            messageDiv.textContent = '';

            try {
                const response = await fetch(apiUrl, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        username: form.username.value,
                        password: form.password.value
                    })
                });

                const result = await response.json();

                if (response.ok && result.token) {
                    localStorage.setItem('jwtToken', result.token);
                    messageDiv.textContent = 'Login successful! Redirecting...';
                    messageDiv.style.color = 'lime';
                    setTimeout(() => {
                        window.location.href = 'dashboard.html';
                    }, 1000);
                } else {
                    throw new Error(result.message || 'Invalid username or password.');
                }
            } catch (error) {
                messageDiv.textContent = error.message;
                messageDiv.style.color = 'red';
                submitButton.disabled = false;
                submitButton.textContent = 'Log In';
            }
        });
    </script>
</body>
</html>
